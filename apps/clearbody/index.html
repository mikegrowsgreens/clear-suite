function getElapsed(qd) { return Date.now() - new Date(qd).getTime() }
function formatDuration(ms) {
  if (ms < 0) return "0s";
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24),y=Math.floor(d/365);
  if(y>0)return`${y}y ${d%365}d`;if(d>0)return`${d}d ${h%24}h`;
  if(h>0)return`${h}h ${m%60}m`;if(m>0)return`${m}m ${s%60}s`;return`${s}s`;
}
function formatTime(ms) {
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);
  if(d>365){const y=Math.floor(d/365);return`${y} year${y>1?'s':''}`;}
  if(d>0)return`${d} day${d>1?'s':''}`;if(h>0)return`${h} hour${h>1?'s':''}`;return`${m} min`;
}
function formatRelativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  if (diff < 7*86400000) return `${Math.floor(diff/86400000)}d ago`;
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

  if(elapsed<H)return"Your body is clearing the last processed meal. Blood sugar beginning to stabilize. Drink water.";
  if(elapsed<8*H)return"Insulin levels dropping. First cravings may appear soon. They peak in 15-20 minutes then pass.";
  if(elapsed<24*H)return"Blood sugar stabilizing without sugar spikes. Your pancreas is getting its first real break.";
  if(elapsed<48*H)return"Sugar withdrawal may be hitting. Headaches, irritability, fatigue are all normal. Stay hydrated and eat protein.";
  if(elapsed<72*H)return"Peak craving window. Days 2-3 are typically the hardest. You are almost through it.";
  if(elapsed<7*D)return"Cravings beginning to fade. Gut bacteria are shifting. Bloating and puffiness decreasing.";
  if(elapsed<14*D)return"Taste buds recalibrating. Insulin sensitivity improving. Inflammation markers dropping.";
  if(elapsed<30*D)return"Energy stabilizing. Skin clearing. Sleep improving. Gut microbiome actively recolonizing.";
  if(elapsed<90*D)return"Deep metabolic changes in progress. Dopamine receptors normalizing. New food habits becoming automatic.";
  if(elapsed<180*D)return"Inflammation near baseline. Metabolic markers significantly improved. Cravings rare and weak.";
  if(elapsed<Y)return"Approaching the one-year mark. Diabetes risk dropping. Gut health fully restored.";
  return"Full metabolic transformation. Every system in your body has benefited from this decision.";
}
function getCategoryProgress(cat, elapsed) {
  let progress=0,currentLabel="Not started",currentTip="",nextLabel=cat.milestones[0]?.label||"",nextTime=cat.milestones[0]?.time||0;
  for(let i=0;i<cat.milestones.length;i++){
    const m=cat.milestones[i];
    if(elapsed>=m.time){
      progress=m.pct;currentLabel=m.label;currentTip=m.tip||"";
      if(i+1<cat.milestones.length){
        const next=cat.milestones[i+1];const segE=elapsed-m.time;const segT=next.time-m.time;
        const eased=1-Math.pow(1-Math.min(segE/segT,1),2);
        progress=m.pct+eased*(next.pct-m.pct);nextLabel=next.label;nextTime=next.time;
      }else{nextLabel="";nextTime=0;}
    }
  }
  if(elapsed<(cat.milestones[0]?.time||0)){
    const f=cat.milestones[0];progress=(elapsed/f.time)*f.pct;
    currentLabel="Recovery beginning";currentTip=f.tip||"";
  }
  return{progress:Math.min(progress,100),currentLabel,currentTip,nextLabel,nextTime};
}
function getWeightedHealth(elapsed) {
  return HEALTH_CATEGORIES.reduce((t,c)=>t+getCategoryProgress(c,elapsed).progress*c.weight,0);
}

function ProgressRing({progress,color,size=100,strokeWidth=8,animated=true,children}) {
  const r=(size-strokeWidth)/2,circ=2*Math.PI*r,offset=circ-(progress/100)*circ;
  return <div style={{position:'relative',width:size,height:size}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={strokeWidth}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={animated?{'--circ':circ,'--offset':offset,animation:'ringDraw 1.2s var(--ease-out) forwards',transition:'stroke-dashoffset 1s var(--ease-out)'}:{transition:'stroke-dashoffset 1s var(--ease-out)'}}/>

}

function BreathingExercise({onClose, onLogCraving}) {
  const[phase,setPhase]=useState('idle');
  const[cycle,setCycle]=useState(0);
  const[seconds,setSeconds]=useState(0);
  const totalCycles=4;const timerRef=useRef(null);
  const phases={inhale:4,hold:4,exhale:6};
  useEffect(()=>{
    if(phase==='idle'||phase==='done')return;
    const dur=phases[phase];setSeconds(dur);
    timerRef.current=setInterval(()=>{
      setSeconds(prev=>{
        if(prev<=1){clearInterval(timerRef.current);
          if(phase==='inhale')setPhase('hold');
          else if(phase==='hold')setPhase('exhale');
          else if(phase==='exhale'){if(cycle+1>=totalCycles)setPhase('done');else{setCycle(c=>c+1);setPhase('inhale');}}
          return 0;}
        return prev-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[phase,cycle]);
  const ringP=phase==='idle'?0:phase==='done'?100:((phases[phase]-seconds)/phases[phase])*100;
  const pc=phase==='inhale'?'#ec4899':phase==='hold'?'#f472b6':phase==='exhale'?'#a78bfa':'#ec4899';
  const pl=phase==='idle'?'Ready':phase==='done'?'Complete':phase==='inhale'?'Breathe In':phase==='hold'?'Hold':'Breathe Out';
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(20px)',animation:'fadeIn 0.3s ease-out'}}>
    <div onClick={e=>e.stopPropagation()} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:32,padding:40,animation:'scaleIn 0.4s var(--ease-spring)'}}>
      <div style={{textAlign:'center'}}>
        <h2 style={{fontFamily:'var(--font-display)',fontSize:24,color:'var(--text-primary)',marginBottom:4}}>{phase==='done'?'You made it.':'Ride the Craving'}</h2>
        <p style={{fontSize:13,color:'var(--text-secondary)'}}>{phase==='done'?'The craving has passed. You chose yourself.':'4-4-6 breathing to calm your nervous system'}</p>
      </div>
      <div style={{position:'relative'}}>
        <ProgressRing progress={ringP} color={pc} size={180} strokeWidth={6} animated={false}>
          <span style={{fontSize:48,fontWeight:300,color:pc,fontFamily:'var(--font-display)',animation:seconds>0?'countPulse 1s ease-in-out infinite':'none'}}>{phase==='idle'?'':phase==='done'?'\u2713':seconds}</span>
          <span style={{fontSize:14,fontWeight:600,color:'var(--text-secondary)',marginTop:4,letterSpacing:1,textTransform:'uppercase'}}>{pl}</span>
        </ProgressRing>
        {phase!=='idle'&&phase!=='done'&&<svg width={180} height={180} style={{position:'absolute',top:0,left:0,transform:'rotate(-90deg)'}}><circle cx={90} cy={90} r={87} fill="none" stroke={pc} strokeWidth={1} opacity={0.15} style={{animation:'breatheRing 4s ease-in-out infinite'}}/></svg>}
      </div>
      {phase!=='done'&&<div style={{display:'flex',gap:8}}>{Array.from({length:totalCycles},(_,i)=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:i<cycle?'#ec4899':i===cycle&&phase!=='idle'?pc:'rgba(255,255,255,0.1)',transition:'all 0.3s'}}/>)}</div>}
      {phase==='idle'&&<button onClick={()=>setPhase('inhale')} style={{padding:'14px 48px',borderRadius:40,border:'none',cursor:'pointer',fontSize:15,fontWeight:700,fontFamily:'var(--font-body)',background:'linear-gradient(135deg, #ec4899, #db2777)',color:'#fff'}}>Begin</button>}
      {phase==='done'&&<div style={{ display:'flex', flexDirection:'column', gap:12, alignItems:'center' }}>
        <button onClick={() => { onLogCraving && onLogCraving(true); onClose(); }} style={{padding:'14px 48px',borderRadius:40,border:'none',cursor:'pointer',fontSize:15,fontWeight:700,fontFamily:'var(--font-body)',background:'linear-gradient(135deg, #ec4899, #db2777)',color:'#fff'}}>Log This Craving</button>
        <button onClick={onClose} style={{padding:'10px 32px',borderRadius:40,border:'1px solid var(--border-medium)',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'var(--font-body)',background:'transparent',color:'var(--text-secondary)'}}>I'm Good</button>
      </div>}
      <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:13,cursor:'pointer',fontFamily:'var(--font-body)',padding:8}}>close</button>
    </div>
  </div>;
}

function ThemeToggle({ prefix }) {
  const [theme, setTheme] = React.useState(() => localStorage.getItem(prefix + '_theme') || 'auto');
  React.useEffect(() => {
    const applyTheme = () => {
      let resolved = theme;
      if (theme === 'auto') { resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
      document.documentElement.setAttribute('data-theme', resolved);
      document.querySelector('meta[name="theme-color"]').setAttribute('content', resolved === 'dark' ? '#0a0608' : '#f8fafc');
    };
    applyTheme();
    localStorage.setItem(prefix + '_theme', theme);
    if (typeof gtag === 'function') gtag('event', 'theme_change', { theme: theme, app: 'clearbody' });
    if (theme === 'auto') {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      mq.addEventListener('change', applyTheme);
      return () => mq.removeEventListener('change', applyTheme);
    }
  }, [theme]);
  const cycle = () => { const order = ['auto', 'light', 'dark']; setTheme(order[(order.indexOf(theme) + 1) % 3]); };
  const icons = { auto: '\u25D0', light: '\u2600', dark: '\u263E' };
  const labels = { auto: 'Auto', light: 'Light', dark: 'Dark' };
  return (
    <button onClick={cycle} title={`Theme: ${labels[theme]}`} style={{
      background:'rgba(255,255,255,0.04)',border:'1px solid var(--border-subtle)',
      color:'var(--text-muted)',width:36,height:36,borderRadius:'50%',cursor:'pointer',
      fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'
    }}>{icons[theme]}</button>
  );
}

        {label:'Days',value:daysClean.toLocaleString(),color:'var(--rose-bright)'},
        thirdStat
      ].map((s,i)=><div key={i} style={{flex:1,textAlign:'center',padding:'14px 8px',borderRadius:'var(--radius-md)',background:'var(--bg-card)',border:'1px solid var(--border-subtle)',animation:`slideUp 0.5s var(--ease-out) ${i*80}ms both`}}>
        <div style={{fontSize:18,fontWeight:700,color:s.color,letterSpacing:-0.5}}>{s.value}</div>
        <div style={{fontSize:9,color:'var(--text-muted)',fontWeight:600,marginTop:3,textTransform:'uppercase',letterSpacing:0.5}}>{s.label}</div>
      </div>)}
    </div>

    <div style={{margin:'8px 20px',padding:'14px 18px',borderRadius:'var(--radius-md)',background:'linear-gradient(135deg,rgba(236,72,153,0.04),rgba(167,139,250,0.02))',borderLeft:'3px solid var(--rose-primary)'}}>
      <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.6,fontStyle:'italic',fontFamily:'var(--font-display)'}}>&ldquo;{motivation}&rdquo;</p>
    </div>

    <div style={{margin:'4px 20px 8px',padding:'10px 14px',borderRadius:'var(--radius-md)',background:'rgba(255,255,255,0.02)',border:'1px solid var(--border-subtle)'}}>
      <p style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.5}}>{tip}</p>
    </div>

    {nextAch&&<div style={{margin:'4px 20px',padding:'14px 18px',borderRadius:'var(--radius-md)',background:'var(--bg-card)',border:'1px solid var(--border-medium)',display:'flex',alignItems:'center',gap:14}}>
      <span style={{fontSize:28,animation:'float 3s ease-in-out infinite'}}>{nextAch.icon}</span>
      <div style={{flex:1}}>
        <div style={{fontSize:10,color:'var(--rose-primary)',fontWeight:700,letterSpacing:0.5,textTransform:'uppercase'}}>Next</div>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text-primary)'}}>{nextAch.label}</div>
        <div style={{fontSize:11,color:'var(--text-muted)'}}>{nextAch.time-elapsed>0?`in ${formatDuration(nextAch.time-elapsed)}`:'Almost there...'}</div>
      </div>
      <div style={{width:42,height:42,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(236,72,153,0.06)',border:'1px solid var(--border-medium)',fontSize:11,fontWeight:800,color:'var(--rose-primary)'}}>{Math.min(100,Math.round((elapsed/nextAch.time)*100))}%</div>
    </div>}

    <div style={{display:'flex',margin:'20px 20px 0',gap:0}}>
      <button style={ts(activeTab==='health')} onClick={()=>setActiveTab('health')}>Recovery</button>
      <button style={ts(activeTab==='badges')} onClick={()=>setActiveTab('badges')}>Milestones</button>
      <button style={ts(activeTab === 'cravings')} onClick={() => setActiveTab('cravings')}>Cravings</button>
    </div>

    <div style={{padding:'16px 20px 120px'}}>
      {activeTab==='health'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        {HEALTH_CATEGORIES.map((cat,i)=><HealthRingCard key={cat.id} category={cat} elapsed={elapsed} onClick={()=>setDetailCat(cat)} delay={i*60}/>)}
      </div>}
      {activeTab==='badges'&&<>
        {latestUnlocked&&<div style={{padding:24,borderRadius:'var(--radius-lg)',marginBottom:16,textAlign:'center',background:'linear-gradient(135deg,rgba(236,72,153,0.06),rgba(236,72,153,0.02))',border:'1px solid var(--border-medium)',animation:'scaleIn 0.4s var(--ease-spring)'}}>
          <span style={{fontSize:44}}>{latestUnlocked.icon}</span>
          <div style={{fontFamily:'var(--font-display)',fontSize:18,color:'var(--rose-primary)',marginTop:10}}>{latestUnlocked.label}</div>
          <div style={{fontSize:13,color:'var(--text-secondary)',marginTop:6,lineHeight:1.5}}>{latestUnlocked.desc}</div>
        </div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:14}}>
          {ACHIEVEMENTS.map((ach,i)=>{const unlocked=elapsed>=ach.time;const isNew=unlocked&&!seenAchs.includes(ach.label);return <AchievementBadge key={i} ach={ach} unlocked={unlocked} isNew={isNew}/>;
          })}
        </div>
      </>}
      {activeTab === 'cravings' && <CravingsTab onOpenLog={() => { setPrefillBreathing(false); setShowCravingLog(true); }} />}
    </div>

    <DetailModal category={detailCat} elapsed={elapsed} onClose={()=>setDetailCat(null)}/>
    {showSettings&&<SettingsModal config={config} onSave={c=>{Store.save(c);onUpdateConfig(c);}} onReset={onReset} onClose={()=>setShowSettings(false)}/>}
    {showBreathing&&<BreathingExercise onClose={()=>setShowBreathing(false)} onLogCraving={(fromBreathing)=>{setPrefillBreathing(fromBreathing);setShowCravingLog(true);}}/>}
    {showCravingLog && <CravingLogModal onClose={() => setShowCravingLog(false)} prefillBreathing={prefillBreathing} onSave={(entry) => { CravingStore.add(entry); }} />}
  </div>;
}

const VALID_CODES = ['FRIENDS2026','CLEARLENT','MIKESBUDS','EARLYBIRD'];
function validatePromoCode(code) { return VALID_CODES.includes(code.toUpperCase().trim()); }

function getTrialStatus(prefix) {
  const unlocked = localStorage.getItem('clear_suite_unlocked') === 'true';
  if (unlocked) return { status: 'unlocked' };
  const firstOpened = localStorage.getItem(prefix + '_first_opened');
  if (!firstOpened) { localStorage.setItem(prefix + '_first_opened', Date.now().toString()); return { status: 'trial', daysLeft: 7 }; }
  const daysInstalled = (Date.now() - parseInt(firstOpened)) / 86400000;
  if (daysInstalled <= 7) return { status: 'trial', daysLeft: Math.ceil(7 - daysInstalled) };
  return { status: 'expired' };
}

function Paywall({ prefix, config }) {
  const [showPromo, setShowPromo] = React.useState(false);
  const [promoCode, setPromoCode] = React.useState('');
  const [promoError, setPromoError] = React.useState('');
  const [showWhy, setShowWhy] = React.useState(false);
  const elapsed = config && config.quitDate ? Date.now() - new Date(config.quitDate).getTime() : 0;
  const daysTracked = Math.floor(elapsed / 86400000);
  const moneySaved = config ? ((elapsed / 86400000) * (config.dailySpend || 0)).toFixed(2) : '0.00';

  React.useEffect(() => {
    if (typeof gtag === 'function') gtag('event', 'paywall_shown', { app: 'clearbody', days_used: daysTracked, trial_expired: true });
  }, []);

  const handlePromo = () => {
    if (validatePromoCode(promoCode)) {
      localStorage.setItem('clear_suite_unlocked', 'true');
      localStorage.setItem('clear_suite_unlock_method', 'promo');
      localStorage.setItem('clear_suite_promo_code', promoCode.toUpperCase().trim());
      if (typeof gtag === 'function') gtag('event', 'unlock', { method: 'promo', app: 'clearbody', promo_code: promoCode.toUpperCase().trim() });
      window.location.reload();
    } else { setPromoError('Invalid code. Please try again.'); }
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(20px)', animation:'fadeIn 0.3s ease-out' }}>
      <div style={{ maxWidth:380, width:'100%', padding:32, textAlign:'center', animation:'scaleIn 0.4s var(--ease-spring)' }}>
        <div style={{ fontSize:48, marginBottom:16 }}>{"\uD83D\uDD12"}</div>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:24, color:'var(--text-primary)', marginBottom:8 }}>Your recovery data is safe</h2>
        {daysTracked > 0 && <p style={{ fontSize:14, color:'var(--rose-primary)', marginBottom:4 }}>{daysTracked} days tracked</p>}
        {parseFloat(moneySaved) > 0 && <p style={{ fontSize:14, color:'var(--text-secondary)', marginBottom:16 }}>${moneySaved} saved so far</p>}
        <p style={{ fontSize:14, color:'var(--text-secondary)', lineHeight:1.6, marginBottom:24 }}>Your 7-day trial has ended. Unlock Clear Suite to keep tracking your progress.</p>
        <a href="https://clearsuite.mikegrowsgreens.com/unlock" style={{ display:'block', width:'100%', padding:'16px', borderRadius:40, border:'none', fontSize:16, fontWeight:700, fontFamily:'var(--font-body)', background:'linear-gradient(135deg, #ec4899, #db2777)', color:'#fff', textDecoration:'none', marginBottom:12 }}>Unlock Clear Suite &mdash; $4.99</a>
        {!showPromo ? (
          <button onClick={() => setShowPromo(true)} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:13, cursor:'pointer', fontFamily:'var(--font-body)', padding:8 }}>Have a promo code?</button>
        ) : (
          <div style={{ marginTop:8 }}>
            <div style={{ display:'flex', gap:8, marginBottom:8 }}>
              <input type="text" value={promoCode} onChange={e => { setPromoCode(e.target.value); setPromoError(''); }} placeholder="Enter code" style={{ flex:1, padding:'12px 14px', borderRadius:'var(--radius-md)', background:'rgba(255,255,255,0.06)', border:'1px solid var(--border-medium)', color:'var(--text-primary)', fontSize:14, outline:'none', fontFamily:'var(--font-body)', textTransform:'uppercase' }} />
              <button onClick={handlePromo} style={{ padding:'12px 20px', borderRadius:'var(--radius-md)', border:'none', background:'var(--rose-primary)', color:'#fff', fontSize:14, fontWeight:700, cursor:'pointer', fontFamily:'var(--font-body)' }}>Apply</button>
            </div>
            {promoError && <p style={{ fontSize:12, color:'var(--rose)', marginTop:4 }}>{promoError}</p>}
          </div>
        )}
        <button onClick={() => setShowWhy(!showWhy)} style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:12, cursor:'pointer', fontFamily:'var(--font-body)', padding:8, marginTop:8 }}>Why pay?</button>
        {showWhy && <p style={{ fontSize:12, color:'var(--text-muted)', lineHeight:1.6, marginTop:4 }}>No ads ever. No accounts. No tracking. Your $4.99 keeps these apps alive and ad-free.</p>}
      </div>
    </div>
  );
}

function App() {
  const[config,setConfig]=useState(()=>Store.get());
  const[showOnboarding,setShowOnboarding]=useState(()=>!Store.hasOnboarded()&&!Store.get());
  const handleSetup=(c)=>{Store.save(c);setConfig(c);};
  const handleUpdate=(c)=>{Store.save(c);setConfig(c);};
  const handleReset=()=>{Store.clear();CravingStore.clear();localStorage.removeItem('clearbody_seen');localStorage.removeItem('clearbody_onboarded');setConfig(null);setShowOnboarding(true);};
  if(showOnboarding)return<Onboarding onComplete={()=>setShowOnboarding(false)}/>;
  if(!config||!config.quitDate)return<SetupScreen onSave={handleSetup}/>;
  const trial = getTrialStatus('clearbody');
  const params = new URLSearchParams(window.location.search);
  if (params.get('unlock')) {
    const ts = parseInt(params.get('unlock'), 36);
    if (Date.now() - ts < 3600000) {
      localStorage.setItem('clear_suite_unlocked', 'true');
      localStorage.setItem('clear_suite_unlock_method', 'token');
      if (typeof gtag === 'function') gtag('event', 'unlock', { method: 'token', app: 'clearbody' });
      window.history.replaceState({}, '', window.location.pathname);
    }
  }
  return <>
    {trial.status === 'expired' && <Paywall prefix="clearbody" config={config} />}
    <Dashboard config={config} onUpdateConfig={handleUpdate} onReset={handleReset}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
</body>
</html>
